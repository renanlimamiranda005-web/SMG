<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gestão Orçamentária BPM</title>
  <style>
:root{--bg:#eef2f6;--panel:#fff;--text:#142033;--muted:#66758c;--primary:#1b4f8f;--primary2:#0f6ccf;--line:#d8e1ee;--ok:#127a3d;--warn:#b7791f;--bad:#b42318;--purple:#7048e8;--shadow:0 12px 30px rgba(16,31,54,.12)}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);font-size:14px}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(440px,100%);background:var(--panel);box-shadow:var(--shadow);border:1px solid var(--line);border-radius:18px;padding:28px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:grid;place-items:center;color:#fff;font-weight:800}.brand h1{margin:0;font-size:22px}.brand span{color:var(--muted);font-size:12px}label{display:block;font-weight:700;margin:10px 0 6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 11px;background:#fff;color:var(--text);outline:none}textarea{min-height:88px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--primary2);box-shadow:0 0 0 3px rgba(15,108,207,.12)}button{border:0;border-radius:9px;padding:10px 13px;cursor:pointer;font-weight:700}.btn{background:var(--primary);color:#fff}.btn:hover{background:#133d70}.btn2{background:#eef4fb;color:var(--primary);border:1px solid #c8dbf1}.btn3{background:#fff;border:1px solid var(--line);color:var(--text)}.danger{background:#fff2f0;color:var(--bad);border:1px solid #ffd0c9}.ok{background:#e9f8ef;color:var(--ok);border:1px solid #bce7cb}.warn{background:#fff7e6;color:var(--warn);border:1px solid #ffe0a3}.app{display:grid;grid-template-columns:255px 1fr;min-height:100vh}.side{background:#142033;color:#e7edf7;padding:18px 14px;position:sticky;top:0;height:100vh;overflow:auto}.side .brand{margin-bottom:24px}.side .logo{background:#fff;color:#142033}.side h1{font-size:17px}.side span{color:#b6c4d8}.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;color:#dbe6f4;border-radius:10px;margin:4px 0;padding:11px}.nav button.active,.nav button:hover{background:rgba(255,255,255,.12)}.main{min-width:0}.top{height:64px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:3}.top b{font-size:18px}.user{display:flex;align-items:center;gap:10px;color:var(--muted)}.content{padding:22px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(20,32,51,.04)}.card .k{font-size:26px;font-weight:800}.card .t{color:var(--muted);margin-top:4px}.grid{display:grid;gap:14px}.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:repeat(3,1fr)}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin:12px 0}.filters{display:grid;grid-template-columns:repeat(6,minmax(140px,1fr));gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}.filters label{font-size:12px;margin:0 0 4px}.table-wrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:auto}table{border-collapse:collapse;width:100%;min-width:1050px}th,td{border-bottom:1px solid var(--line);padding:10px 11px;text-align:left;vertical-align:top}th{background:#f6f8fb;color:#344563;font-size:12px;position:sticky;top:0;z-index:1}tr:hover td{background:#fbfdff}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700}.b-blue{background:#e8f2ff;color:#0f5aa8}.b-ok{background:#e9f8ef;color:var(--ok)}.b-warn{background:#fff7e6;color:var(--warn)}.b-bad{background:#fff2f0;color:var(--bad)}.b-gray{background:#eef2f6;color:#4d5b70}.b-purple{background:#f0ebff;color:var(--purple)}.actions{display:flex;gap:6px;flex-wrap:wrap}.modal-bg{position:fixed;inset:0;background:rgba(7,17,31,.52);display:grid;place-items:center;z-index:10;padding:18px}.modal{background:#fff;border-radius:16px;width:min(1050px,100%);max-height:92vh;overflow:auto;box-shadow:var(--shadow);border:1px solid var(--line)}.modal-head{display:flex;justify-content:space-between;gap:12px;align-items:start;border-bottom:1px solid var(--line);padding:16px 18px}.modal-body{padding:18px}.tabs{display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:14px}.tabs button{background:#fff;border:1px solid var(--line);border-bottom:0;border-radius:9px 9px 0 0}.tabs button.active{background:#eef4fb;color:var(--primary)}.timeline{border-left:3px solid #c8dbf1;margin-left:8px;padding-left:14px}.tl{margin:0 0 14px}.tl b{display:block}.tl span{color:var(--muted);font-size:12px}.drop{border:2px dashed #b6c8dd;border-radius:14px;padding:22px;text-align:center;background:#fbfdff}.help{color:var(--muted);font-size:12px;line-height:1.4}.toast{position:fixed;right:18px;bottom:18px;background:#142033;color:#fff;border-radius:12px;padding:13px 16px;z-index:20;box-shadow:var(--shadow)}.bar{height:10px;background:#eef2f6;border-radius:999px;overflow:hidden}.bar>i{display:block;height:100%;background:var(--primary2)}.split{display:grid;grid-template-columns:1.3fr .7fr;gap:14px}.small{font-size:12px;color:var(--muted)}.pill-row{display:flex;gap:6px;flex-wrap:wrap}.print-only{display:none}@media(max-width:980px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.cards,.grid.two,.grid.three,.split{grid-template-columns:1fr}.filters{grid-template-columns:1fr 1fr}.top{position:relative}}@media(max-width:640px){.filters{grid-template-columns:1fr}.content{padding:12px}.top{padding:0 12px}.actions button{width:100%}}@media print{.side,.top,.toolbar,.filters,.actions,.no-print{display:none!important}.app{display:block}.content{padding:0}.card,.table-wrap{box-shadow:none;border:1px solid #999}.print-only{display:block}}

  </style>
</head>
<body>
  <div id="app"><div style="padding:25px;font-family:Arial"><h2>Carregando sistema...</h2><p>Se ficar parado aqui, confirme se você extraiu o ZIP completo e se os arquivos <b>app.js</b> e <b>database.js</b> estão na mesma pasta do index.html.</p></div></div>
  <script>window.addEventListener("error",function(e){var a=document.getElementById("app"); if(a && a.innerText.indexOf("Carregando sistema")>=0){a.innerHTML="<div style=\"padding:25px;font-family:Arial\"><h2>Erro ao carregar</h2><p>Provavelmente o ZIP não foi extraído completo ou os arquivos JS não estão junto do index.html.</p><p>Erro: "+e.message+"</p></div>";}});</script>
  <script src="database.js"></script>
  <script src="app.js"></script>
</body>
</html>
